version: '3.8'

services:
  app:
    build: .
    image: batchmaster-app:latest
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/batchmaster
      - NODE_ENV=production
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=batchmaster
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    # Backups can be handled by a sidecar or a cron job on the host
    # For a sidecar approach:
    # labels:
    #   - "com.batchmaster.backup=true"

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
